<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Career Navigator | V5</title>
    <meta name="description" content="Navigate your career in a premium dark dashboard experience.">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <div class="noise-overlay"></div>

        <!-- Discovery Scene -->
        <div class="scene" id="discovery-scene">
            <div class="left-panel">
                <div class="sidebar-main">
                    <div class="hub-back" id="hub-back-trigger">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M19 12H5M12 19l-7-7 7-7"/>
                        </svg>
                        <span>Back</span>
                    </div>
                    <p class="sidebar-eyebrow" id="sidebar-eyebrow">Explore Roles</p>
                    <h1 class="sidebar-title" id="hub-label">Occupation</h1>
                    <p class="sidebar-desc" id="hub-sub">Browse and select from available career tracks to discover your path forward.</p>
                </div>
                <div class="sidebar-footer">
                    <div class="stat-row">
                        <span class="stat-label">Available Roles</span>
                        <span class="stat-value" id="role-count">40</span>
                    </div>
                </div>
            </div>

            <div class="right-panel">
                <div class="roles-grid" id="roles-list"></div>
            </div>
        </div>

        <!-- Path View -->
        <div class="path-view" id="path-view">
            <div class="left-panel">
                <div class="sidebar-main">
                    <span class="path-chip" id="path-header-dot">Career Path</span>
                    <h1 class="sidebar-title" id="path-role-title">Selected Role</h1>
                    <p class="sidebar-desc">Your structured progression from entry-level to industry leadership.</p>
                    <div class="path-progress">
                        <div class="progress-bar"><div class="progress-fill"></div></div>
                        <span class="progress-label">5 stages</span>
                    </div>
                </div>
                <div class="sidebar-footer">
                    <button class="explore-button" id="explore-btn">Explore</button>
                    <button class="back-button" id="back-btn">← Back to Selection</button>
                </div>
            </div>
            <div class="right-panel">
                <div class="path-steps" id="horizontal-path"></div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
