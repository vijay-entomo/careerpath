<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Career Studio | V4</title>
    <meta name="description" content="Explore career paths with a split-panel editorial layout.">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- Gradient Mesh Background -->
        <div class="mesh-bg">
            <div class="mesh-blob blob-1"></div>
            <div class="mesh-blob blob-2"></div>
            <div class="mesh-blob blob-3"></div>
        </div>

        <!-- Discovery Scene: Split Layout -->
        <div class="scene" id="discovery-scene">
            <!-- LEFT: Hub Panel -->
            <div class="left-panel">
                <div class="hub-card" id="main-hub">
                    <div class="hub-back" id="hub-back-trigger">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M19 12H5M12 19l-7-7 7-7"/>
                        </svg>
                        <span>Back</span>
                    </div>
                    <div class="hub-content">
                        <span class="hub-tag">Career Explorer</span>
                        <h1 class="hub-label" id="hub-label">Occupation</h1>
                        <p class="hub-sub" id="hub-sub">Select a role to begin your journey</p>
                    </div>
                    <div class="hub-decoration">
                        <div class="hub-circle c1"></div>
                        <div class="hub-circle c2"></div>
                    </div>
                </div>
            </div>

            <!-- RIGHT: Roles List -->
            <div class="right-panel">
                <div class="roles-list" id="roles-list">
                    <!-- Roles injected via JS -->
                </div>
            </div>
        </div>

        <!-- Path View: Same split layout -->
        <div class="path-view" id="path-view">
            <div class="left-panel">
                <div class="path-info-card">
                    <span class="path-chip" id="path-header-dot">Career Path</span>
                    <h1 id="path-role-title">Selected Role</h1>
                    <p class="path-description">Your professional growth trajectory across 5 progression tiers.</p>
                    <div class="path-actions">
                        <button class="explore-button" id="explore-btn">Explore</button>
                        <button class="back-button" id="back-btn">‹ Back</button>
                    </div>
                </div>
            </div>
            <div class="right-panel">
                <div class="path-steps" id="horizontal-path">
                    <!-- Steps injected via JS -->
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
