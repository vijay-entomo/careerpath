<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Career Constellation | V2</title>
    <meta name="description" content="Navigate your career constellation — discover paths in a futuristic dark interface.">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <canvas id="stars-canvas"></canvas>

        <!-- Discovery Scene -->
        <div class="scene" id="discovery-scene">
            <div class="hub-container" id="main-hub-container">
                <div class="hub-ring ring-1"></div>
                <div class="hub-ring ring-2"></div>
                <div class="hub-ring ring-3"></div>
                <div class="hub" id="main-hub">
                    <div class="hub-content">
                        <div class="hub-back" id="hub-back-trigger">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M19 12H5M12 19l-7-7 7-7"/>
                            </svg>
                        </div>
                        <span class="hub-label">Occupation</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Path View -->
        <div class="path-view" id="path-view">
            <div class="selected-role-header">
                <div class="glow-badge" id="path-header-dot"></div>
                <h1 id="path-role-title">Selected Role</h1>
                <p class="path-subtitle">Career trajectory across 5 progression tiers</p>
            </div>
            <div class="horizontal-path" id="horizontal-path"></div>
            <div class="path-footer">
                <button class="explore-button" id="explore-btn">Explore</button>
                <button class="back-button" id="back-btn">← Back to Constellation</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
