<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Career Discovery | V6 Kinetic Bento</title>
    <meta name="description" content="Discover your career in an immersive, morphing bento-grid experience of 2026.">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@100..900&family=Outfit:wght@100..900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- Iridescent Kinetic Background -->
        <div class="bg-liquid">
            <div class="glow-layer g1"></div>
            <div class="glow-layer g2"></div>
            <div class="glow-layer g3"></div>
        </div>

        <!-- SVG Refractive Filter -->
        <svg style="display: none;">
            <defs>
                <filter id="refract">
                    <feTurbulence type="fractalNoise" baseFrequency="0.01" numOctaves="3" result="noise" />
                    <feDisplacementMap in="SourceGraphic" in2="noise" scale="10" />
                </filter>
            </defs>
        </svg>

        <!-- Dynamic Bento Board -->
        <div class="scene" id="discovery-scene">
            <div class="hero-stats">
                <div class="header-top">
                    <span class="cyber-label" id="cyber-label">SYS_STATUS: ACTIVE</span>
                    <button class="theme-toggle" id="theme-toggle" title="Toggle Theme">
                        <svg class="sun-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
                        <svg class="moon-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                    </button>
                </div>
                <h1 class="glitch-text" id="glitch-header" data-text="OCCUPATION">OCCUPATION</h1>
                <div class="metric">
                    <span class="label">EXPLORE_INDEX</span>
                    <span class="value" id="role-count">40</span>
                </div>
            </div>

            <div class="bento-board" id="bento-grid">
                <!-- Tiles injected via JS -->
            </div>

            <!-- Back Toggle (Floating in V6) -->
            <div class="back-pill" id="hub-back-trigger">
                <span>REVERSE_PATH</span>
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <path d="M19 12H5M12 19l-7-7 7-7"/>
                </svg>
            </div>
        </div>

        <!-- Path View (Integrated into the Bento) -->
        <div class="path-view" id="path-view">
            <div class="path-header">
                <div class="refractive-header">
                    <span class="id-badge" id="path-header-id">LEVEL: L1 Entry</span>
                    <h2 id="path-role-title">Selected role</h2>
                </div>
                <div class="path-info">
                    <p>Morphological trajectory across 5 evolutionary stages.</p>
                    <div class="action-row">
                        <button class="btn-primary" id="explore-btn">INIT_EXPLORE</button>
                        <button class="btn-secondary" id="back-btn">RETURN</button>
                    </div>
                </div>
            </div>
            
            <div class="path-timeline" id="horizontal-path">
                <!-- Kinetic Milestones injected here -->
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
