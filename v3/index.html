<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Career Studio | V3</title>
    <meta name="description" content="Discover careers in a premium editorial experience.">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- Gradient Mesh Background -->
        <div class="mesh-bg">
            <div class="mesh-blob blob-1"></div>
            <div class="mesh-blob blob-2"></div>
            <div class="mesh-blob blob-3"></div>
        </div>

        <!-- Discovery Scene -->
        <div class="scene" id="discovery-scene">
            <div class="hub-container" id="main-hub-container">
                <div class="hub" id="main-hub">
                    <div class="hub-content">
                        <div class="hub-back" id="hub-back-trigger">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M19 12H5M12 19l-7-7 7-7"/>
                            </svg>
                        </div>
                        <span class="hub-label">Occupation</span>
                        <span class="hub-sub">Select a career to explore</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Path View -->
        <div class="path-view" id="path-view">
            <div class="selected-role-header">
                <span class="path-chip" id="path-header-dot">Career Path</span>
                <h1 id="path-role-title">Selected Role</h1>
                <p class="path-subtitle">A 5-stage professional growth journey</p>
            </div>
            <div class="horizontal-path" id="horizontal-path"></div>
            <div class="path-footer">
                <button class="explore-button" id="explore-btn">Explore</button>
                <button class="back-button" id="back-btn">‹ Back</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
